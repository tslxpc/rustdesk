name: 自定义编译 RustDesk (可选择平台)
on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 编译 Windows (x64) Flutter新版
        required: true
        default: true
        type: boolean
      build_windows_sciter:
        description: 编译 Windows (x86) Sciter旧版
        required: true
        default: true
        type: boolean
      build_macos:
        description: 编译 macOS (x64 + arm64)
        required: true
        default: true
        type: boolean
      build_android:
        description: 编译 Android
        required: true
        default: true
        type: boolean
      build_linux:
        description: 编译 Linux (x64 + arm64)
        required: true
        default: true
        type: boolean
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "custom-build"

env:
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  CARGO_NDK_VERSION: "3.1.2"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  FLUTTER_ELINUX_VERSION: "3.16.9"
  TAG_NAME: "${{ inputs.upload-tag }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4850575a33844ba10b"
  ARMV7_VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
  VERSION: "1.4.6"
  NDK_VERSION: "r28c"
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"
  MACOS_P12_BASE64: "${{ secrets.MACOS_P12_BASE64 }}"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}-2"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

# ========================= Windows Flutter 新版 =========================
  build-for-windows-flutter:
    if: ${{ inputs.build_windows }}
    name: Windows x64 Flutter
    needs: [generate-bridge]
    runs-on: windows-2022
    continue-on-error: true
    steps:
      - uses: actions/github-script@v6
        with: { script: "core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || ''); core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');" }
      
      - name: 配置 Git 镜像（修复 aom 拉取失败）
        run: |
          git config --global url."https://github.com/jbeich/aom.git".insteadOf https://aomedia.googlesource.com/aom
          git config --global url."https://github.com/webmproject/libwebm.git".insteadOf https://chromium.googlesource.com/webm/libwebm
      
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: actions/download-artifact@master
        with: { name: bridge-artifact, path: ./ }
      - uses: KyleMayes/install-llvm-action@v1
        with: { version: "${{ env.LLVM_VERSION }}" }
      - uses: subosito/flutter-action@v2
        with: { channel: "stable", flutter-version: "${{ env.FLUTTER_VERSION }}" }

      - name: 替换 Flutter 引擎
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - uses: dtolnay/rust-toolchain@v1
        with: { toolchain: "${{ env.SCITER_RUST_VERSION }}", targets: "x86_64-pc-windows-msvc", components: "rustfmt" }
      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: "windows-2022" }
      - uses: lukka/run-vcpkg@v11
        with: { vcpkgDirectory: "C:\\vcpkg", vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }

      - name: 安装依赖（含 aom）
        shell: bash
        run: $VCPKG_ROOT/vcpkg install libvpx libyuv opus aom --triplet x64-windows-static

      - name: 编译 RustDesk
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack

      - name: 打包 exe
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          python3 ./generate.py -f ../../flutter/build/windows/x64/runner/Release -o . -e ../../rustdesk.exe
          popd

      - uses: microsoft/setup-msbuild@v2
      - name: 编译 MSI
        run: |
          pushd ./res/msi
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 -p:TargetVersion=Windows10

      - name: 上传发布
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          tag: "${{ env.TAG_NAME }}"
          artifacts: |
            flutter/build/windows/x64/runner/Release/*.exe
            res/msi/bin/x64/Release/*.msi
          token: ${{ secrets.GITHUB_TOKEN }}

# ========================= Windows Sciter 32位 旧版 =========================
  build-for-windows-sciter:
    if: ${{ inputs.build_windows_sciter }}
    name: Windows x86 Sciter
    runs-on: windows-2022
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: i686-pc-windows-msvc, arch: x86, triplet: x86-windows-static }
    steps:
      - uses: actions/github-script@v6
        with: { script: "core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || ''); core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');" }
      
      - name: 配置 Git 镜像
        run: |
          git config --global url."https://github.com/jbeich/aom.git".insteadOf https://aomedia.googlesource.com/aom
          git config --global url."https://github.com/webmproject/libwebm.git".insteadOf https://chromium.googlesource.com/webm/libwebm
      
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install LLVM
        uses: rustdesk-org/install-llvm-action-32bit@master
        with: { version: "${{ env.LLVM_VERSION }}" }

      - uses: dtolnay/rust-toolchain@v1
        with: { toolchain: nightly-2023-10-13-${{ matrix.job.target }}, targets: "${{ matrix.job.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { prefix-key: "win32" }
      - uses: lukka/run-vcpkg@v11
        with: { vcpkgDirectory: C:\vcpkg, vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }

      - name: 安装依赖（含 aom）
        shell: bash
        run: $VCPKG_ROOT/vcpkg install libvpx libyuv opus aom --triplet ${{ matrix.job.triplet }}

      - name: 编译
        shell: bash
        run: |
          python3 res/inline-sciter.py
          cargo build --features inline,vram,hwcodec --release --target ${{ matrix.job.target }}

      - name: 打包
        shell: bash
        run: |
          mkdir -p Release
          cp target/${{ matrix.job.target }}/release/rustdesk.exe Release/
          curl -LJo Release/sciter.dll https://github.com/c-smile/sciter-sdk/raw/master/bin.win/x32/sciter.dll
          sed -i '/dpiAware/d' res/manifest.xml
          pushd libs/portable
          python3 generate.py -f ../../Release -o . -e ../../rustdesk.exe
          popd

      - name: 上传
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          tag: "${{ env.TAG_NAME }}"
          artifacts: "Release/*.exe,rustdesk.exe"
          token: ${{ secrets.GITHUB_TOKEN }}

# ========================= macOS =========================
  build-for-macOS:
    if: ${{ inputs.build_macos }}
    name: macOS ${{ matrix.job.arch }}
    needs: [generate-bridge]
    runs-on: ${{ matrix.job.os }}
    strategy:
      matrix:
        job:
          - { os: macos-15-intel, arch: x86_64 }
          - { os: macos-14, arch: arm64 }
    steps:
      - name: 配置镜像
        run: |
          git config --global url."https://github.com/jbeich/aom.git".insteadOf https://aomedia.googlesource.com/aom
      
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      
      - run: brew install llvm create-dmg nasm
      - uses: dtolnay/rust-toolchain@v1
        with: { toolchain: "${{ env.MAC_RUST_VERSION }}" }
      - uses: actions/download-artifact@master
        with: { name: bridge-artifact }
      - uses: lukka/run-vcpkg@v11
        with: { vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }
      
      - run: vcpkg install libvpx libyuv opus aom
      - run: ./build.py --flutter --hwcodec --unix-file-copy-paste
      
      - name: 打包 DMG
        run: create-dmg rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.dmg flutter/build/macos/Build/Products/Release/RustDesk.app
      
      - uses: ncipollo/release-action@v1
        with:
          prerelease: true
          tag: "${{ env.TAG_NAME }}"
          artifacts: "*.dmg"
          token: ${{ secrets.GITHUB_TOKEN }}

# ========================= Android =========================
  build-rustdesk-android:
    if: ${{ inputs.build_android }}
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - name: 配置镜像
        run: |
          git config --global url."https://github.com/jbeich/aom.git".insteadOf https://aomedia.googlesource.com/aom
      
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      
      - run: sudo apt install -y clang cmake ninja-build nasm openjdk-17-jdk-headless
      - uses: actions/download-artifact@master
        with: { name: bridge-artifact }
      - uses: nttld/setup-ndk@v1
        with: { ndk-version: "${{ env.NDK_VERSION }}" }
      - uses: dtolnay/rust-toolchain@v1
        with: { toolchain: "${{ env.RUST_VERSION }}" }
      
      - name: 编译
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
          ./flutter/build_android.sh ${{ matrix.arch }}
      
      - uses: ncipollo/release-action@v1
        with:
          prerelease: true
          tag: "${{ env.TAG_NAME }}"
          artifacts: "flutter/build/app/outputs/flutter-apk/*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}

# ========================= Linux =========================
  build-rustdesk-linux:
    if: ${{ inputs.build_linux }}
    needs: [generate-bridge]
    runs-on: ${{ matrix.job.on }}
    strategy:
      matrix:
        job:
          - { arch: x86_64, on: ubuntu-22.04 }
          - { arch: aarch64, on: ubuntu-22.04-arm }
    steps:
      - name: 配置镜像
        run: |
          git config --global url."https://github.com/jbeich/aom.git".insteadOf https://aomedia.googlesource.com/aom
      
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      
      - uses: dtolnay/rust-toolchain@v1
        with: { toolchain: "${{ env.RUST_VERSION }}" }
      - uses: actions/download-artifact@master
        with: { name: bridge-artifact }
      - uses: lukka/run-vcpkg@v11
        with: { vcpkgDirectory: "/opt/artifacts/vcpkg", vcpkgGitCommitId: "${{ env.VCPKG_COMMIT_ID }}" }
      
      - name: 编译
        uses: rustdesk-org/run-on-arch-action@amd64-support
        with:
          arch: ${{ matrix.job.arch }}
          distro: ubuntu18.04
          run: |
            vcpkg install libvpx libyuv opus aom
            cargo build --lib --features hwcodec,flutter --release
            ./build.py --flutter --skip-cargo
      
      - uses: ncipollo/release-action@v1
        with:
          prerelease: true
          tag: "${{ env.TAG_NAME }}"
          artifacts: "rustdesk-*.deb"
          token: ${{ secrets.GITHUB_TOKEN }}
